<header class="navbar-wrapper" [class.scrolled]="isScrolled">
  <nav class="navbar">
    <div class="logo">
      <img src="assets/images/logo.png" alt="ChinaCars Import logo" class="logo-img" />
      <span class="logo-text">China<span class="logo-accent">Cars</span></span>
    </div>

    <ul class="nav-links">
      <li><a href="#about">O nas</a></li>
      <li><a href="#cars">Oferta</a></li>
      <li><a href="#contact">Kontakt</a></li>
    </ul>

    <a href="#cars" class="btn-nav">Zobacz Auta</a>

    <button class="hamburger" (click)="toggleMenu()" aria-label="Menu mobilne" [attr.aria-expanded]="isOpen">
      <span></span><span></span><span></span>
    </button>
  </nav>

  @if (isOpen) {
    <div class="mobile-menu">
      <a href="#about" (click)="toggleMenu()">O nas</a>
      <a href="#cars" (click)="toggleMenu()">Oferta</a>
      <a href="#contact" (click)="toggleMenu()">Kontakt</a>
    </div>
  }
</header>
