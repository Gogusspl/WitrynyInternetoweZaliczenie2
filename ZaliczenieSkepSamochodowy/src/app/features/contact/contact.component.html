<section class="contact" id="contact">
  <div class="container">

    <div class="contact-left">
      <h2>Kontakt</h2>
      <p class="contact-sub">Skontaktuj się z nami</p>

      <form (ngSubmit)="onSubmit()" class="contact-form">
        <div class="form-row">
          <input type="text" placeholder="Imię" required aria-label="Imię" />
          <input type="email" placeholder="E-mail" required aria-label="E-mail" />
        </div>
        <textarea placeholder="Wiadomość" rows="5" required aria-label="Wiadomość"></textarea>
        <button type="submit" class="btn-submit">Wyślij</button>
      </form>
    </div>

    <div class="contact-right">
      <h3 class="contact-right-title">Dane kontaktowe</h3>

      <div class="contact-item">
        <div class="contact-icon-wrap">
          <span class="material-icons">phone</span>
        </div>
        <div class="contact-item-text">
          <span class="contact-label">Telefon</span>
          <span>+48 123 456 789</span>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon-wrap">
          <span class="material-icons">email</span>
        </div>
        <div class="contact-item-text">
          <span class="contact-label">E-mail</span>
          <span>kontakt&#64;chinacarsimport.pl</span>
        </div>
      </div>

      <div class="contact-item">
        <div class="contact-icon-wrap">
          <span class="material-icons">location_on</span>
        </div>
        <div class="contact-item-text">
          <span class="contact-label">Adres</span>
          <span>ul. Kontsantynów 1H, 20-708 Lublin</span>
        </div>
      </div>
    </div>

  </div>
</section>
